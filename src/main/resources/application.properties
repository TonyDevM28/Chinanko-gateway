spring.application.name=api-gateway

# === PUERTO ===
server.port=${PORT:8081}

# ==========================================
# === EUREKA CLIENT (RENDER) ===
# ==========================================
eureka.client.enabled=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL}

# ==========================================
# === CONFIGURACIÓN DE INSTANCIA (CRÍTICO) ===
# ==========================================
# Esto asegura que el Gateway aparezca en el Dashboard con su URL real de Render
eureka.instance.hostname=${RENDER_EXTERNAL_HOSTNAME:localhost}
eureka.instance.prefer-ip-address=false
# El Gateway recibe tráfico externo por el puerto 80 (HTTP) en Render
eureka.instance.non-secure-port=80
eureka.instance.non-secure-port-enabled=true
# Generar un ID único para evitar colisiones en el registro
eureka.instance.instance-id=${spring.application.name}:${random.value}

# === CONFIGURACIÓN DEL GATEWAY ===
# Nota: locator.enabled=true crea rutas automáticas, pero tus rutas manuales abajo tienen prioridad.
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ... (configuraciones de puerto y eureka igual que antes) ...

# === RUTA 1: API REST ===
spring.cloud.gateway.routes[0].id=chinanko-route
spring.cloud.gateway.routes[0].uri=lb://CHINANKO
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/**, /swagger-ui/**, /v3/api-docs/**

# === RUTA 2: GRAPHQL Y GRAPHIQL (CORREGIDA) ===
spring.cloud.gateway.routes[1].id=chinanko-graphql-route
spring.cloud.gateway.routes[1].uri=lb://CHINANKO
# Agregamos '/**' al final de graphiql para que cargue los scripts JS y CSS ocultos
# Y separamos las rutas claramente
spring.cloud.gateway.routes[1].predicates[0]=Path=/graphql/**
spring.cloud.gateway.routes[1].predicates[1]=Path=/graphiql/**
# IMPORTANTE: GraphiQL a veces pide recursos en la raiz, esto ayuda a redirigir
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/graphiql(?<segment>/?.*), /graphiql$\{segment}

# === CORS GLOBAL ===
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
