spring.application.name=api-gateway

# === PUERTO ===
server.port=${PORT:8081}

# === EUREKA (ACTIVADO OBLIGATORIAMENTE) ===
# Debe estar en true para que el Gateway pueda consultar el registro
eureka.client.enabled=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL}

# === CONFIGURACIÓN DEL GATEWAY ===
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# === RUTA 1: CHINANKO (REST API) ===
spring.cloud.gateway.routes[0].id=chinanko-route
# CAMBIO CLAVE: Usamos 'lb://' (Load Balancer) + El NOMBRE del servicio en Eureka
# Ya no usamos URLs fijas.
spring.cloud.gateway.routes[0].uri=lb://CHINANKO
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/**, /swagger-ui/**, /v3/api-docs/**

# === RUTA 2: CHINANKO GRAPHQL ===
spring.cloud.gateway.routes[1].id=chinanko-graphql-route
# Apuntamos al mismo servicio (CHINANKO) pero filtramos por la ruta de graphql
spring.cloud.gateway.routes[1].uri=lb://CHINANKO
# Agregamos /graphiql para que puedas ver la interfaz visual
spring.cloud.gateway.routes[1].predicates[0]=Path=/graphql/**, /graphiql/**

# === CORS ===
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
